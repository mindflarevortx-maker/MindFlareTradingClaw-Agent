<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindFlare TradingClaw — Settings</title>
  <link rel="stylesheet" href="../popup/popup.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <!-- Header -->
  <header class="mf-opt-header">
    <div class="mf-opt-brand">
      <span class="mf-opt-logo">MF</span>
      <div>
        <h1 class="mf-opt-title">MindFlare TradingClaw</h1>
        <span class="mf-opt-version">v1.2.0-beta1 — Settings</span>
      </div>
    </div>
  </header>

  <main class="mf-opt-main">
    <!-- Trading Settings -->
    <section class="mf-opt-card" id="mf-section-trading">
      <h2 class="mf-opt-card-title">Trading Settings</h2>
      <div class="mf-opt-grid">
        <div class="mf-opt-field">
          <label for="mf-autoPilot">Auto-Pilot</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-autoPilot"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-baseInvestment">Base Investment ($)</label>
          <input type="number" id="mf-baseInvestment" class="mf-opt-input" min="1" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-maxInvestment">Max Investment ($)</label>
          <input type="number" id="mf-maxInvestment" class="mf-opt-input" min="1" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-tradeDuration">Trade Duration (s)</label>
          <input type="number" id="mf-tradeDuration" class="mf-opt-input" min="5" step="5">
        </div>
        <div class="mf-opt-field">
          <label for="mf-minPayout">Min Payout (%)</label>
          <input type="number" id="mf-minPayout" class="mf-opt-input" min="1" max="100" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-martingaleEnabled">Martingale</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-martingaleEnabled"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-martingaleSteps">Martingale Steps</label>
          <input type="number" id="mf-martingaleSteps" class="mf-opt-input" min="1" max="10" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-martingaleMultiplier">Martingale Multiplier</label>
          <input type="number" id="mf-martingaleMultiplier" class="mf-opt-input" min="1" step="0.1">
        </div>
      </div>
    </section>

    <!-- Scanner Settings -->
    <section class="mf-opt-card" id="mf-section-scanner">
      <h2 class="mf-opt-card-title">Scanner Settings</h2>
      <div class="mf-opt-grid">
        <div class="mf-opt-field">
          <label for="mf-wsEnabled">WebSocket Enabled</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-wsEnabled"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-domPollFallback">DOM Poll Fallback</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-domPollFallback"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-scanInterval">Scan Interval (ms)</label>
          <input type="number" id="mf-scanInterval" class="mf-opt-input" min="500" step="100">
        </div>
      </div>
    </section>

    <!-- Technical Analysis -->
    <section class="mf-opt-card" id="mf-section-ta">
      <h2 class="mf-opt-card-title">Technical Analysis</h2>
      <div class="mf-opt-grid mf-opt-grid-4">
        <div class="mf-opt-field">
          <label for="mf-rsiPeriod">RSI Period</label>
          <input type="number" id="mf-rsiPeriod" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-macdFast">MACD Fast</label>
          <input type="number" id="mf-macdFast" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-macdSlow">MACD Slow</label>
          <input type="number" id="mf-macdSlow" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-macdSignal">MACD Signal</label>
          <input type="number" id="mf-macdSignal" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-bollingerPeriod">Bollinger Period</label>
          <input type="number" id="mf-bollingerPeriod" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-bollingerStdDev">Bollinger Std Dev</label>
          <input type="number" id="mf-bollingerStdDev" class="mf-opt-input" min="0.1" step="0.1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-emaPeriods">EMA Periods</label>
          <input type="text" id="mf-emaPeriods" class="mf-opt-input" placeholder="9,21,50,200">
        </div>
        <div class="mf-opt-field">
          <label for="mf-atrPeriod">ATR Period</label>
          <input type="number" id="mf-atrPeriod" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-stochasticK">Stochastic K</label>
          <input type="number" id="mf-stochasticK" class="mf-opt-input" min="2" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-stochasticD">Stochastic D</label>
          <input type="number" id="mf-stochasticD" class="mf-opt-input" min="1" step="1">
        </div>
      </div>
    </section>

    <!-- LLM Settings -->
    <section class="mf-opt-card" id="mf-section-llm">
      <h2 class="mf-opt-card-title">LLM Settings</h2>
      <div class="mf-opt-grid mf-opt-grid-2">
        <div class="mf-opt-field">
          <label for="mf-llmProvider">Provider</label>
          <select id="mf-llmProvider" class="mf-opt-input mf-opt-select">
            <option value="ollama">Ollama</option>
            <option value="openrouter">OpenRouter</option>
            <option value="groq">Groq</option>
            <option value="together">Together</option>
            <option value="deepinfra">DeepInfra</option>
            <option value="mistral">Mistral</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="cohere">Cohere</option>
            <option value="fireworks">Fireworks</option>
            <option value="perplexity">Perplexity</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="mf-opt-field">
          <label for="mf-llmModel">Model Name</label>
          <input type="text" id="mf-llmModel" class="mf-opt-input" placeholder="llama3">
        </div>
        <div class="mf-opt-field mf-opt-field-ollama" id="mf-field-ollama">
          <label for="mf-ollamaBaseUrl">Ollama Base URL</label>
          <input type="text" id="mf-ollamaBaseUrl" class="mf-opt-input" placeholder="http://localhost:11434">
        </div>
        <div class="mf-opt-field mf-opt-field-key" id="mf-field-apikey">
          <label for="mf-apiKey">API Key</label>
          <input type="password" id="mf-apiKey" class="mf-opt-input" placeholder="sk-...">
        </div>
        <div class="mf-opt-field mf-opt-field-custom" id="mf-field-custom">
          <label for="mf-customEndpoint">Custom Endpoint</label>
          <input type="text" id="mf-customEndpoint" class="mf-opt-input" placeholder="https://api.example.com/v1">
        </div>
        <div class="mf-opt-field mf-opt-field-custom" id="mf-field-customkey">
          <label for="mf-customKey">Custom API Key</label>
          <input type="password" id="mf-customKey" class="mf-opt-input" placeholder="sk-...">
        </div>
      </div>
      <div class="mf-opt-grid mf-opt-grid-2" style="margin-top:8px">
        <div class="mf-opt-field">
          <label for="mf-llmTemperature">Temperature: <span id="mf-temp-display">0.3</span></label>
          <input type="range" id="mf-llmTemperature" class="mf-opt-range" min="0" max="2" step="0.05" value="0.3">
        </div>
        <div class="mf-opt-field">
          <label for="mf-llmMaxTokens">Max Tokens</label>
          <input type="number" id="mf-llmMaxTokens" class="mf-opt-input" min="64" step="64">
        </div>
      </div>
    </section>

    <!-- Candle Store Settings -->
    <section class="mf-opt-card" id="mf-section-candles">
      <h2 class="mf-opt-card-title">Candle Store Settings</h2>
      <div class="mf-opt-grid mf-opt-grid-2">
        <div class="mf-opt-field">
          <label for="mf-candleHistoryDays">History Days</label>
          <input type="number" id="mf-candleHistoryDays" class="mf-opt-input" min="1" step="1">
        </div>
        <div class="mf-opt-field">
          <label for="mf-candleMaxPerPair">Max Candles / Pair</label>
          <input type="number" id="mf-candleMaxPerPair" class="mf-opt-input" min="100" step="100">
        </div>
      </div>
      <div class="mf-opt-btn-row">
        <button id="mf-btn-load-history" class="mf-opt-btn mf-opt-btn-primary">Load History</button>
        <button id="mf-btn-clear-history" class="mf-opt-btn mf-opt-btn-danger">Clear History</button>
        <button id="mf-btn-export-data" class="mf-opt-btn mf-opt-btn-secondary">Export Data</button>
      </div>
    </section>

    <!-- UI Settings -->
    <section class="mf-opt-card" id="mf-section-ui">
      <h2 class="mf-opt-card-title">UI Settings</h2>
      <div class="mf-opt-grid mf-opt-grid-2">
        <div class="mf-opt-field">
          <label for="mf-overlayVisible">Overlay Visible</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-overlayVisible"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-overlayOpacity">Overlay Opacity: <span id="mf-opacity-display">0.95</span></label>
          <input type="range" id="mf-overlayOpacity" class="mf-opt-range" min="0.1" max="1" step="0.05" value="0.95">
        </div>
      </div>
    </section>

    <!-- Debug -->
    <section class="mf-opt-card" id="mf-section-debug">
      <h2 class="mf-opt-card-title">Debug</h2>
      <div class="mf-opt-grid mf-opt-grid-2">
        <div class="mf-opt-field">
          <label for="mf-debugMode">Debug Mode</label>
          <label class="mf-toggle"><input type="checkbox" id="mf-debugMode"><span class="mf-toggle-slider"></span></label>
        </div>
        <div class="mf-opt-field">
          <label for="mf-logLevel">Log Level</label>
          <select id="mf-logLevel" class="mf-opt-input mf-opt-select">
            <option value="debug">Debug</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Actions -->
  <footer class="mf-opt-footer">
    <div id="mf-opt-toast" class="mf-opt-toast"></div>
    <div class="mf-opt-footer-actions">
      <button id="mf-btn-reset" class="mf-opt-btn mf-opt-btn-danger">Reset to Defaults</button>
      <button id="mf-btn-save" class="mf-opt-btn mf-opt-btn-primary">Save Settings</button>
    </div>
  </footer>

  <script src="../popup/popup.js"></script>
  <script src="options.js"></script>
</body>
</html>
